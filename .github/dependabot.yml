version: 2

updates:
  - package-ecosystem: github-actions
    directories:
      - '/'
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    commit-message:
      prefix: 'chore'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'automated'
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: docker
    directories:
      - '/'
      - '/localgit'
    schedule:
      interval: weekly
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      docker:
        patterns:
          - '*'

  - package-ecosystem: npm
    directories:
      - '/'
      - '/packages/git-proxy-cli'
      - '/plugins/git-proxy-plugin-samples'
      - '/test/fixtures/test-package'
      - '/website'
    schedule:
      interval: weekly
    versioning-strategy: increase
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      npm-non-major:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
