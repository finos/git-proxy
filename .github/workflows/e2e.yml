name: E2E Tests

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@7c525be6cc8a882d5163ce04293cac18617c709f

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@112d3e30db3bf437d207fea57f22510569d1ab97

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git for CI
        run: |
          git config --global user.name "CI Runner"
          git config --global user.email "ci@example.com"
          git config --global init.defaultBranch main

      - name: Build and start services with Docker Compose
        run: docker compose up -d --build --wait || true

      - name: Debug service state
        if: always()
        run: |
          docker compose ps
          docker compose logs

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Run Cypress E2E tests
        run: npm run cypress:run:docker
        timeout-minutes: 10
        env:
          CYPRESS_BASE_URL: http://localhost:8081
          CYPRESS_API_BASE_URL: http://localhost:8081
          CYPRESS_GIT_PROXY_URL: http://localhost:8000
          CYPRESS_GIT_SERVER_TARGET: git-server:8443

      - name: Dump git-proxy logs on failure
        if: failure()
        run: docker compose logs git-proxy --tail=100

      - name: Upload Cypress screenshots on failure
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose down -v
