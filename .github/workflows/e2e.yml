name: E2E Tests

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@9cd4410b76a77e8054419e70095df406556617a8

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@112d3e30db3bf437d207fea57f22510569d1ab97

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git for CI
        run: |
          git config --global user.name "CI Runner"
          git config --global user.email "ci@example.com"
          git config --global init.defaultBranch main

      - name: Build and start services with Docker Compose
        run: docker compose up -d --build --wait || true

      - name: Debug service state
        if: always()
        run: |
          docker compose ps
          docker compose logs

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Stop services
        if: always()
        run: docker compose down -v
