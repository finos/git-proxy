name: experimental-inventory - Publish to NPM
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'release version without v prefix'
        required: true
        type: string
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Setup .npmrc file to publish to npm
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          persist-credentials: false

      - name: check version matches input
        run: |
          grep "\"version\": \"${GITHUB_EVENT_INPUTS_VERSION}\"," package.json
        working-directory: ./experimental/license-inventory
        env:
          GITHUB_EVENT_INPUTS_VERSION: ${{ github.event.inputs.version }}

      - run: npm ci
        working-directory: ./experimental/license-inventory

      - run: npm run build
        working-directory: ./experimental/license-inventory

      - run: npm publish --access=public
        working-directory: ./experimental/license-inventory
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
