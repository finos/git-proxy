name: Code Cleanliness

on: [pull_request]

env:
  NODE_VERSION: 22

permissions:
  contents: read

jobs:
  linting:
    name: Linting
    runs-on: ubuntu-latest
    steps: # list of steps
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - name: Install NodeJS
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Code Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: npm install --workspaces

      - name: Code Linting
        run: |
          npm run lint
          npm run lint --workspaces --if-present

      - name: Check formatting
        run: npm run format:check

      - name: Check generated config types are up-to-date
        run: |
          npm run generate-config-types
          if ! git diff --exit-code src/config/generated/config.ts; then
            echo "Generated config types are out of date. Run 'npm run generate-config-types' locally and commit the changes."
            exit 1
          fi
